<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Formulario de Contacto</title>
</head>
<body>
    <div class="container">
        <div id="successMessage" class="success-message">
            ¡Formulario enviado exitosamente! Gracias por contactarnos.
        </div>

        <h1>Contact Us</h1>
        
        <form id="contactForm" novalidate>
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name <span class="required">*</span></label>
                    <input type="text" id="firstName" name="firstName">
                    <div class="error-message" id="firstNameError">This field is required</div>
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name <span class="required">*</span></label>
                    <input type="text" id="lastName" name="lastName">
                    <div class="error-message" id="lastNameError">This field is required</div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" name="email">
                <div class="error-message" id="emailError">Please enter a valid email address</div>
            </div>

            <div class="form-group">
                <label>Query Type <span class="required">*</span></label>
                <div class="radio-group">
                    <div class="radio-option" id="generalOption">
                        <input type="radio" id="general" name="queryType" value="general">
                        <label for="general">
                            <span class="radio-custom"></span>
                            General Enquiry
                        </label>
                    </div>
                    
                    <div class="radio-option" id="supportOption">
                        <input type="radio" id="support" name="queryType" value="support">
                        <label for="support">
                            <span class="radio-custom"></span>
                            Support Request
                        </label>
                    </div>
                </div>
                <div class="error-message" id="queryTypeError">Please select a query type</div>
            </div>

            <div class="form-group">
                <label for="message">Message <span class="required">*</span></label>
                <textarea id="message" name="message"></textarea>
                <div class="error-message" id="messageError">This field is required</div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="consent" name="consent">
                <label for="consent">
                    <span class="checkbox-custom"></span>
                    I consent to being contacted by the team <span class="required">*</span>
                </label>
            </div>
            <div class="error-message" id="consentError">To submit this form, please consent to being contacted</div>

            <button type="button" class="submit-btn" onclick="enviarFormulario()">Submit</button>
        </form>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</html>
